    <script>
      function setSelectedIndex(s, v) {
        for ( var i = 0; i < s.options.length; i++ ) {
            if ( s.options[i].value == v ) {
                s.options[i].selected = true;
                return;
            }
        }
      }
      var scanned = 0;
      var q = window.location.search;
      function SetLang() {
        var m = document.getElementById("lang");
        var v = m.options[m.selectedIndex].value;
        var q = window.location.search;
        if (!q) {
          // Nothing in query string, so just pick something.
          //if (f = document.thumbs_up) f.submit();
          var lang = window.navigator.language;
          window.location.href = window.location.href + "?lang=" + lang.substr(0,2);
        } else if (!scanned && q.length > 7 && q.substr(0,6) == "?lang=") {
          scanned = 1;
          var sel = q.substr(6,2);
          if (v != sel) {
            // Must Fix Language
            setSelectedIndex(m, sel);
            v = sel;
          }
        }
      }

    <script>
      var xatEmbed = '<nobr><embed wmode="transparent" src="http://www.xatech.com/web_gear/chat/chat.swf" quality="high" width="540" height="405" name="chat" FlashVars="id=216211109" align="middle" allowScriptAccess="sameDomain" type="application/x-shockwave-flash" pluginspage="http://xat.com/update_flash.php" /><embed wmode="transparent" src="http://www.xatech.com/web_gear/chat/chat.swf" quality="high" width="540" height="405" name="chat" FlashVars="id=212728941" align="middle" allowScriptAccess="sameDomain" type="application/x-shockwave-flash" pluginspage="http://xat.com/update_flash.php" /></nobr>';

      $(function() {
        SetLang();

        var blockedCountries = ['MX', 'PT'];
  
        $('#xatChat > div').html(xatEmbed);
        
        $('#toggleXat').click(function(){
          if($('#xatChat > div').is(':visible')){
            $(this).text('Show Chat');
            $('#xatChat > div').hide();
          } else {
            $(this).text('Hide Chat');
            $('#xatChat > div').show();
          }
        });

        $.ajax({url: 'http://freegeoip.net/json/', type: 'POST', dataType: 'jsonp', success: function(location){
          var countryCode = location['country_code'];
          if(blockedCountries.indexOf(countryCode) > -1){
            $('#xatChat').remove();
          }       
        }});

        // Lowercase item names as indexes
        // Hash thing with proper item name and id as paired values
        var allItems = {};
        var queuedItems = [];

        var addItems = function(data) {
          $.each(data, function(itemIndex, itemDetails) {
            var itemId = itemDetails.paper_item_id;
            var itemName = itemDetails.label;

            allItems[itemName.toLowerCase()] = {
              id: itemId,
              name: itemName
            };
          });

          $("#item").on("input", function() {
            $("#items").empty();
            queuedItems = [];
            var itemInput = $("#item").val().toLowerCase();
            if(!/^\s*$/.test(itemInput)) {
              var listItems = 0;
              $.each(allItems, function(itemName, itemDetails) {
                var itemId = itemDetails.id;
                if(itemName.indexOf(itemInput) > -1) {
                  if(++listItems > 5) {
                    // Add the rest to the queue.
                    queuedItems.push(itemDetails);
                  } else {
                    $("#items").append(
                      $("<li>").attr({id: itemId, class: "list-group-item"})
                      .append($("<img>").attr("src", "http://media8.clubpenguin.com/game/items/images/paper/icon/60/" + itemId + ".png"))
                      .append($("<b>").append(itemId).attr("class", "item-id"))
                      .append($("<i>").append(itemDetails.name).attr("class", "item-name")
                    ));
                  }
                }
              });
            }
          });
          $("#moreItems").click(function() {
            var itemCount = 0;
            for(var itemCount = 0; itemCount < 5; itemCount++) {
              var item = queuedItems.pop();
              $("#items").append(
                $("<li>").attr({id: item.id, class: "list-group-item"})
                .append($("<img>").attr("src", "http://media8.clubpenguin.com/game/items/images/paper/icon/60/" + item.id + ".png"))
                .append($("<b>").append(item.id).attr("class", "item-id"))
                .append($("<i>").append(item.name).attr("class", "item-name"))
              );
            }
          });
        };
        $.getJSON("https://crossorigin.me/http://media1.clubpenguin.com/play/en/web_service/game_configs/paper_items.json", addItems);
      });
    </script>
