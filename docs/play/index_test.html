    <script type="text/javascript">
        (function () {
            window.addEventListener("load", window.onresize = function () {
                if ('webkitRequestAnimationFrame' in window) {
                    var height = document.documentElement.clientHeight;
                    if (height == window.oldH) return;
                    else window.oldH = height;
                    document.getElementById("game").style.height = height - 125 + "px";
                }
                var width = document.getElementById("game").clientHeight * (935 / 590);
                if (width == window.oldW) return;
                else window.oldW = width;
                if (width > document.documentElement.clientWidth) width = 1000;
                document.getElementById("game").style.width =
                        document.getElementsByTagName("table")[0].style.width =
                                document.getElementsByTagName("ul")[0].style.width = width + "px";
            }, false);
            window.onscroll = function () {
                if (window.pageYOffset > 85) {
                    document.getElementById("header").style.position = "absolute";
                    document.getElementById("header").style.top = "85px";
                } else {
                    document.getElementById("header").style.position = "fixed";
                    document.getElementById("header").style.top = 0;
                }
            };
            window.addEventListener("load", function () {
                var qc = window.location.search.substr(1).split("&");
                for (var i in qc) {
                    switch (qc[i].split("=")[0]) {
                        case "lang":
                            document.getElementById('gameEmbed').parentNode.removeChild(document.getElementById('gameEmbed'));
                            var embed = document.createElement('embed');
                            embed.setAttribute("id", "gameEmbed");
                            embed.setAttribute("base", "http://media.cpps.me/play/");
                            embed.setAttribute("src", "http://media.cpps.me/play/loader_r7_2014.swf?lang=" + qc[i].split("=")[1]);
                            document.getElementById('game').appendChild(embed);
                            document.getElementById('lang').value = qc[i].split("=")[1];
                            break;
                    }
                }
            }, true);
            setTimeout(window.onresize, 100);
            var refresh = function () {
                var script = document.createElement("script");
                script.type = 'text/javascript';
                script.src = "http://stats.cpps.me/users.js?" + new Date().getTime();
                script.onload = function () {
                    document.getElementById('stats').innerHTML = stats.online + " Online";
                };
                script.onreadystatechange = function () {
                    if (this.readyState != "complete") return;
                    this.onload();
                };
                document.getElementsByTagName("head")[0].appendChild(script);
            };
            refresh();
            setInterval(refresh, 60000);
        })();


    </script>

    <script language="JavaScript" type="text/javascript">
        function setSelectedIndex(s, v) {
            for (var i = 0; i < s.options.length; i++) {
                if (s.options[i].value == v) {
                    s.options[i].selected = true;
                    return;
                }
            }
        }
        var scanned = 0;
        var q = window.location.search;
        function SetLang() {
            var m = document.getElementById("lang");
            var v = m.options[m.selectedIndex].value;
            var q = window.location.search;
            if (!q) {
                // Nothing in query string, so just pick something.
                //if (f = document.thumbs_up) f.submit();
                var lang = window.navigator.language;
                window.location.href = window.location.href + "?lang=" + lang.substr(0, 2);
            } else if (!scanned && q.length > 7 && q.substr(0, 6) == "?lang=") {
                scanned = 1;
                var sel = q.substr(6, 2);
                if (v != sel) {
                    // Must Fix Language
                    setSelectedIndex(m, sel);
                    v = sel;
                }
            }
        }
        SetLang();
    </script>
