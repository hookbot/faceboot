    <script src="https://cdnjs.cloudflare.com/ajax/libs/swfobject/2.2/swfobject.min.js"></script>
    <script>
        jQuery.extend({
            getQueryParameters : function(str) {
                return JSON.parse(JSON.stringify((str || document.location.search).replace(/(^\?)/,'').split("&").map(function(n){return n = n.split("="),this[n[0]] = n[1],this}.bind({}))[0]));
            }});

        function updateOnline() {
            $.getJSON("https://crossorigin.me/http://stats.cpps.me/users.json", function(e) {
                $("#online_badge").text(e.online)
            })
        }

        function displayMessage(title, message){
            BootstrapDialog.show({
                title: title,
                message: message
            });
        }

        $(document).ready(function () {
            var lang = $.getQueryParameters()["lang"];
            if (!lang) {
                var q = $.getQueryParameters();
                q["lang"] = window.navigator.language.substr(0,2);
                location.search = $.param(q);
                return;
            }
            changeLanguage(lang.substr(0,2));
            var param_vars = {
                allowScriptAccess:"always",
                base: (("https:" == document.location.protocol) ? "https" : "http") + "://media.cpps.me/play/"
            };
            var attributes = {
                id:"gameEmbed",
                name:"gameEmbed",
            };
            var callback = function (e){
                if(e.success){

                }
            };
            swfobject.embedSWF((("https:" == document.location.protocol) ? "https" : "http") + '://media.cpps.me/play/loader_r17_2016.swf',"gameEmbed","100%","100%","10",false,$.getQueryParameters(),param_vars,attributes,callback);

            $(".item-search").select2({
                placeholder: "Search items",
                allowClear: true,
                width: '300px',
                dropdownCssClass: "bigdrop",
                templateResult: formatItems,
                crossDomain: true,
                minimumInputLength: 1,
                escapeMarkup: function (m) {
                    return m;
                },
                ajax: {
                    url: "https://rile5.com/items.php",
                    cache: true,
                    async: true,
                    dataType: 'json',
                    data: function (params) {
                        return {
                            q: params.term,
                            page: params.page || 1
                        };
                    },
                    results: function (data) {
                        return {
                            results: $.map(data, function (item) {
                                return {
                                    text: item.name,
                                    id: item.id,
                                    disabled: true
                                }
                            })
                        };
                    }
                }
            });
            $(function () {
                $(".language-selector > li").click(function () {
                    var q = $.getQueryParameters();
                    q["lang"] = $(this).data("lang");
                    location.search = $.param(q);
                });
            });
            updateOnline();
            setTimeout(updateOnline, 360000);
        });

        function changeLanguage(code) {
            var t = ["en", "pt", "fr", "de", "es"];
            if (t.indexOf(code) == -1) return;
            $(".language-selector > li").each(function () {
                if ($(this).data("lang") == code) {
                    $(this).addClass("active");
                    //document.title = "Play - " + $(this).text();
                    $('#language-text').html($(this).text() + ' <span class="caret"></span>');
                } else {
                    $(this).removeClass("active");
                }
            });
        }

        function getFlashMovieObject(){
            if (window.document["gameEmbed"]) {
                return window.document["gameEmbed"];
            }
            if (navigator.appName.indexOf("Microsoft Internet") == -1) {
                if (document.embeds && document.embeds["gameEmbed"])
                    return document.embeds["gameEmbed"];
            }
            else {
                return document.getElementById("gameEmbed");
            }
        }

        function sendMessage(msg){
            getFlashMovieObject().wmessage(msg);
        }

        function ignKey(){
            return "okay";
        }

        function formatItems(item) {
            if (item.id == '' || item.id == undefined) return;
            return '<div class="row">' +
                    '<div class="col-xs-6 col-md-4"><img src="http://cdn.clubpenguin.com/game/items/images/paper/icon/60/' + item.id + '.png" onerror="this.src=\'https://placeholdit.imgix.net/~text?txtsize=30&txt=X&w=60&h=60&txttrack=0\'" class="img-circle"></div>' +
                    '<div class="col-xs-12 col-sm-6 col-md-8"><p class="text-primary">' + item.text + '</p><p class="text-muted">Item ID: ' + item.id + '</p></div>' +
                    '</div>';
        }
    </script>
