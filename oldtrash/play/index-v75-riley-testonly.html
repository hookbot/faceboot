<script>
jQuery.extend({
    getQueryParameters : function(str) {
        return (str || document.location.search).replace(/(^\?)/,'').split("&").map(function(n){return n = n.split("="),this[n[0]] = n[1],this}.bind({}))[0];
    }
});

function updateOnline() {
    $.getJSON("https://crossorigin.me/http://stats.cpps.me/users.json", function(e) {
        $("#online_badge").text(e.online)
    })
}

$(document).ready(function () {

    var lang = $.getQueryParameters()["lang"];
    if (!lang) {
        var q = $.getQueryParameters();
        q["lang"] = window.navigator.language.substr(0,2);
        location.search = $.param(q);
        return;
    }
    changeLanguage(lang);
    $(".item-search").select2({
        placeholder: "Search items",
        allowClear: true,
        width: '300px',
        dropdownCssClass: "bigdrop",
        templateResult: formatItems,
        delay: 250,
        crossDomain: true,
        minimumInputLength: 1,
        escapeMarkup: function (m) {
            return m;
        },
        ajax: {
            url: "https://rile5.com/items.php",
            cache: true,
            async: true,
            dataType: 'json',
            data: function (params) {
                return {
                    q: params.term,
                    page: params.page || 1
                };
            },
            results: function (data) {
                return {
                    results: $.map(data, function (item) {
                        return {
                            text: item.name,
                            id: item.id
                        }
                    })
                };
            }
        }
    });

    $(function () {
        $(".language-selector > li").click(function () {
            var q = $.getQueryParameters();
            q["lang"] = $(this).data("lang");
            location.search = $.param(q);
        });
    });
    updateOnline();
    setTimeout(updateOnline, 360000);
});

function changeLanguage(code) {
    var t = ["en", "pt", "fr", "de", "es"];
    if (t.indexOf(code) == -1) return;
    $(".language-selector > li").each(function () {
        if ($(this).data("lang") == code) {
            $(this).addClass("active");
            document.title = "Play - " + $(this).text();
            $('#language-text').html($(this).text() + ' <span class="caret"></span>');
        } else {
            $(this).removeClass("active");
        }
    });
}

function formatItems(e) {
    return "" != e.id && void 0 != e.id ? '<div class="row"><div class="col-xs-6 col-md-4"><img src="http://media8.clubpenguin.com/game/items/images/paper/icon/60/' + e.id + '.png" onerror="this.src=\'https://placeholdit.imgix.net/~text?txtsize=30&txt=X&w=60&h=60&txttrack=0\'" class="img-circle"></div><div class="col-xs-12 col-sm-6 col-md-8"><p class="text-primary">' + e.text + '</p><p class="text-muted">Item ID: ' + e.id + "</p></div></div>" : void 0
}

        menu:false,

});
$(document).ready(function () {
    //Toggle fullscreen
    $("#panel-fullscreen").click(function (e) {
        e.preventDefault();
        var $this = $(this);
        if ($this.children('i').hasClass('glyphicon-resize-full'))
        {
            $this.children('i').removeClass('glyphicon-resize-full');
            $this.children('i').addClass('glyphicon-resize-small');
        }
        else if ($this.children('i').hasClass('glyphicon-resize-small'))
        {
            $this.children('i').removeClass('glyphicon-resize-small');
            $this.children('i').addClass('glyphicon-resize-full');
        }
        $(this).closest('.panel').toggleClass('panel-fullscreen');
    });
});
