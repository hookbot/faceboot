<script language="JavaScript" type="text/javascript">
  function setSelectedIndex(s, v) {
    for ( var i = 0; i < s.options.length; i++ ) {
        if ( s.options[i].value == v ) {
            s.options[i].selected = true;
            return;
        }
    }
  }
  var scanned = 0;
  var q = window.location.search;
  function SetLang() {
    var m = document.getElementById("menu");
    var v = m.options[m.selectedIndex].value;
    var q = window.location.search;
    if (!q) {
      // Nothing in query string, so just pick something.
      //if (f = document.thumbs_up) f.submit();
      var lang = window.navigator.language;
      window.location.href = window.location.href + "?lang=" + lang.substr(0,2);
    } else if (!scanned && q.length > 7 && q.substr(0,6) == "?lang=") {
      scanned = 1;
      var sel = q.substr(6,2);
      if (v != sel) {
        // Must Fix Language
        setSelectedIndex(m, sel);
        v = sel;
      }
    }
    var url = "http://media.cpps.me/play/loader.swf?lang=" + v;
    var txt = '<center><object classid="clsid:d27cdb6e-ae6d-11cf-96b8-444553540000" width="100%" height="100%" id="test1" '
      + 'codebase="http://fpdownload.macromedia.com/pub/shockwave/cabs/flash/swflash.cab">'
      + '<param name=movie value="' + url + '" />'
      + '<embed src="' + url + '" width="999" height="631" name="test1" type="application/x-shockwave-flash" '
      + 'pluginspage="http://www.adobe.com/go/getflashplayer" /><\/object></center>';
    document.getElementById("game").innerHTML = txt;
  }
  SetLang();
</script>
