    <script type="text/javascript">
        window.scrollTo(0, 0);
        $(document).ready(function () {
            var lang = getParameterByName("lang");
            if (!lang) {
                lang = window.navigator.language;
                window.location.href = window.location.href + "?lang=" + lang.substr(0,2);
                return;
            }
            changeLanguage(lang);
            $(".item-search").select2({
                placeholder: "Search items",
                allowClear: true,
                width: '300px',
                dropdownCssClass: "bigdrop",
                templateResult: formatItems,
                delay: 250,
                crossDomain: true,
                minimumInputLength: 1,
                escapeMarkup: function (m) {
                    return m;
                },
                ajax: {
                    url: "https://rile5.com/items.php",
                    cache: true,
                    async: true,
                    dataType: 'json',
                    data: function (params) {
                        return {
                            q: params.term,
                            page: params.page || 1
                        };
                    },
                    results: function (data) {
                        return {
                            results: $.map(data, function (item) {
                                return {
                                    text: item.name,
                                    id: item.id
                                }
                            })
                        };
                    }
                }
            });
            $(function () {
                $(".language-selector > li").click(function () {
                    var selected = $(this).data("lang");
                    window.location.href = "?lang=" + selected;
                });
            });
            updateOnline();
            setTimeout(updateOnline, 360000);
        });
        function updateOnline() {
            $.getJSON("https://crossorigin.me/http://stats.cpps.me/users.json", function (data) {
                $("#online_badge").text(data.online);
            });
        }
        function changeLanguage(code) {
            var langs = ["en", "pt", "fr", "de", "es"];
            if (langs.indexOf(code) == -1) return;
            /* Replace existing game */
            var parent = $('#gameEmbed').parent();
            var c=Math.floor(Math.random()*5)+1;
            var newElement = '<embed class="embed-responsive-item" id="gameEmbed" base="http://media' + c + '.cpps.me/play/" ' +
                    'src="http://media' + c + '.cpps.me/play/loader_r15_2016.swf?lang=' + code + '"></embed>';
            $('#gameEmbed').remove();
            parent.append(newElement);
            $(".language-selector > li").each(function () {
                if ($(this).data("lang") == code) {
                    $(this).addClass("active");
                    document.title = "Play - " + $(this).text();
                    $('#language-text').html($(this).text() + ' <span class="caret"></span>');
                } else {
                    $(this).removeClass("active");
                }
            });
        }
        function getParameterByName(name, url) {
            if (!url) url = window.location.href;
            name = name.replace(/[\[\]]/g, "\\$&");
            var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
                    results = regex.exec(url);
            return !results ? null : !results[2] ? '' : decodeURIComponent(results[2].replace(/\+/g, " "));
        }
        function formatItems(item) {
            if (item.id == '' || item.id == undefined) return;
            return '<div class="row">' +
                    '<div class="col-xs-6 col-md-4"><img src="http://media8.clubpenguin.com/game/items/images/paper/icon/60/' + item.id + '.png" onerror="this.src=\'https://placeholdit.imgix.net/~text?txtsize=30&txt=X&w=60&h=60&txttrack=0\'" class="img-circle"></div>' +
                    '<div class="col-xs-12 col-sm-6 col-md-8"><p class="text-primary">' + item.text + '</p><p class="text-muted">Item ID: ' + item.id + '</p></div>' +
                    '</div>';
        }
    </script>
